<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG SIÊU THỊ 33 SHOP & DỊCH VỤ</title>
    <style>
        :root { --main-color: #fb5531; --bg-color: #f5f5f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); margin: 0; color: #333; padding-bottom: 100px; }
        header { background: linear-gradient(135deg, #fb5531, #ff8331); color: white; text-align: center; padding: 20px; font-size: 22px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 1100px; margin: auto; padding: 15px; }
        
        /* Lưới Shop */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px; }
        .shop-card { background: white; padding: 20px 10px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .shop-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-color: var(--main-color); }
        .shop-number { background: var(--main-color); color: white; width: 40px; height: 40px; line-height: 40px; border-radius: 50%; margin: 0 auto; font-weight: bold; font-size: 18px; }
        
        /* Lưới sản phẩm */
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.08); display: flex; flex-direction: column; border: 2px solid transparent; transition: 0.2s; position: relative; }
        .card.selected { border-color: #2ecc71; background-color: #f9fff9; }
        
        /* Ô tích chọn sản phẩm */
        .select-box { position: absolute; top: 10px; right: 10px; z-index: 10; width: 22px; height: 22px; cursor: pointer; }
        
        .media-box { width: 100%; height: 170px; background: #fafafa; overflow: hidden; }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .p-name { font-size: 13px; font-weight: 500; height: 36px; overflow: hidden; margin-bottom: 5px; line-height: 18px; }
        .price { color: #ee4d2d; font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 5px; margin-top: auto; }
        .buy { display: block; color: white; padding: 8px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 11px; text-transform: uppercase; text-align: center; }
        .select-btn { display: block; background: #fff; color: #555; border: 1px solid #ccc; padding: 6px; border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .card.selected .select-btn { background: #2ecc71; color: white; border-color: #2ecc71; }

        .back { display: inline-block; margin-bottom: 15px; padding: 8px 15px; background: #fff; color: var(--main-color); border: 1px solid var(--main-color); border-radius: 20px; cursor: pointer; font-weight: bold; }
        .shop-title { margin-bottom: 15px; font-weight: bold; color: #555; font-size: 18px; }

        /* Thanh tổng tiền cố định ở đáy màn hình */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -4px 15px rgba(0,0,0,0.15); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .cart-info { font-size: 16px; font-weight: 500; }
        .cart-total { color: #ee4d2d; font-size: 20px; font-weight: bold; margin-left: 5px; }
        .cart-btn { background: #ee4d2d; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 22px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<header>HỆ THỐNG SIÊU THỊ 33 SHOP & DỊCH VỤ</header>
<div class="container" id="content"></div>

<div class="cart-bar" id="cartBar" style="display: none;">
    <div class="cart-info">Đã chọn: <span id="cartCount" style="font-weight:bold; color: #fb5531;">0</span> mặt hàng | Tổng tính: <span class="cart-total" id="cartTotalPrice">0đ</span></div>
    <button class="cart-btn" onclick="checkoutCart()">Xem danh sách chọn</button>
</div>

<script>
const SHEET_ID = "1_Xwvp767BMtRnqA-9lF3ROOSbBIBk1k_QwvE2CT-h5s";

const SHOPS = [
    {n: "Ngân An", g: "0"}, {n: "Minh Châu", g: "2042428163"}, {n: "Bích Ngọc", g: "2009289883"},
    {n: "Gia Bách", g: "793885535"}, {n: "Ngô Gialinh", g: "2040744619"}, {n: "Minh Phương", g: "1363743009"},
    {n: "Anh Dũng", g: "87027625"}, {n: "Hải Vinh", g: "1113281647"}, {n: "Bạch Anh", g: "71371535"},
    {n: "Kim Huệ", g: "1965546264"}, {n: "Tuấn Anh", g: "1073997052"}, {n: "Thế Anh", g: "849927033"},
    {n: "Thị Mai", g: "298899208"}, {n: "Việt Hưng", g: "756110609"}, {n: "Thị Hồng", g: "879903903"},
    {n: "Văn Hiệp", g: "1122882591"}, {n: "Thị Chi", g: "232472008"}, {n: "Tấn Bắc", g: "632628873"},
    {n: "Thị Tâm", g: "1889905962"}, {n: "Văn Giữ", g: "731061721"}, {n: "Thị Bình", g: "1643784423"},
    {n: "Bích Nguyệt", g: "332503970"}, {n: "Văn Tuấn", g: "1594362635"}, {n: "Yến Nhi", g: "1770126917"},
    {n: "Thị Phương", g: "1795348787"}, {n: "Hoài Nam", g: "1468986790"}, {n: "Khắc Năng", g: "801738430"},
    {n: "Thị Hà", g: "673532367"}, {n: "Minh Nam", g: "1798395208"}, {n: "Kim Anh", g: "2038870297"},
    {n: "Minh Hằng", g: "1796982267"}, {n: "Quý Cường", g: "1593249867"}, 
    {n: "DỊCH VỤ VỆ SINH", g: "518971287"}
];

let selectedProducts = []; // Lưu trữ sản phẩm người dùng chọn để tính tổng tiền

function getBtn(url) {
    if (!url) return { t: "XEM CHI TIẾT", c: "#fb5531" };
    const lowerUrl = url.toLowerCase();
    if (lowerUrl.includes('shopee.vn')) return { t: "MUA TẠI SHOPEE", c: "#ee4d2d" };
    if (lowerUrl.includes('zalo.me')) return { t: "NHẮN ZALO TƯ VẤN", c: "#0068ff" };
    if (lowerUrl.includes('facebook.com')) return { t: "LIÊN HỆ FACEBOOK", c: "#1877f2" };
    return { t: "XEM CHI TIẾT", c: "#fb5531" };
}

// Hàm phân tích chuỗi giá tiền từ Sheet thành số nguyên để cộng trừ
function parsePrice(priceStr) {
    if (!priceStr) return 0;
    // Lọc bỏ tất cả ký tự không phải là số (như đ, vnđ, dấu chấm, dấu phẩy)
    let num = parseInt(priceStr.replace(/[^0-9]/g, ""), 10);
    return isNaN(num) ? 0 : num;
}

// Định dạng lại số tiền thành chuỗi hiển thị ví dụ: 150000 -> 150.000đ
function formatMoney(number) {
    return number.toLocaleString('vi-VN') + 'đ';
}

async function render(shopIndex) {
    const main = document.getElementById("content");
    main.innerHTML = '<div style="text-align:center;padding:50px;font-weight:500;">Đang tải dữ liệu cửa hàng...</div>';
    document.getElementById("cartBar").style.display = "none";
    selectedProducts = []; // reset giỏ hàng khi đổi shop
    
    const idx = parseInt(shopIndex) - 1;
    const shop = SHOPS[idx];
    
    if(!shop) {
        location.href = '?';
        return;
    }

    try {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${shop.g}`);
        const csv = await res.text();
        
        // Sử dụng Regex để tách dòng chuẩn xác cho định dạng CSV bảo vệ dữ liệu nằm trong ngoặc kép ""
        const rows = csv.split(/\r?\n/).slice(1);
        
        let html = `
            <div class="back" onclick="location.href='?'">⬅ Quay lại trang chủ</div>
            <div class="shop-title">Cửa hàng: ${shop.n} (Số ${shopIndex})</div>
            <div class="products">`;
        
        let hasProduct = false;
        let pIndex = 0;

        rows.forEach(r => {
            if (!r.trim()) return;
            
            // Xử lý chuẩn quy tắc phân tách CSV bằng dấu phẩy
            const col = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            if (col[0]) {
                const stockStatus = col[4]?.replace(/"/g, "").trim();
                
                // Kiểm tra trạng thái hàng hóa bằng chữ "Còn"
                if (stockStatus === "Còn" || stockStatus === "1") {
                    hasProduct = true;
                    
                    // Lấy chính xác giá trị và xóa bỏ dấu ngoặc kép thừa dữ liệu
                    const productName = col[0].replace(/"/g, "").trim();
                    let img = col[1]?.replace(/"/g, "").trim() || "";
                    const productPriceText = col[2]?.replace(/"/g, "").trim() || "Liên hệ";
                    const affiliateLink = col[3]?.replace(/"/g, "").trim() || "#";
                    
                    const btn = getBtn(affiliateLink);
                    const priceValue = parsePrice(productPriceText);

                    if (img.includes('youtu')) {
                        img = `https://img.youtube.com/vi/${img.split('/').pop()}/0.jpg`;
                    }
                    
                    html += `
                    <div class="card" id="product-${pIndex}">
                        <input type="checkbox" class="select-box" onchange="toggleSelectProduct(${pIndex}, '${productName.replace(/'/g, "\\'")}', ${priceValue}, this)">
                        <div class="media-box">
                            <img src="${img}" alt="${productName}" onerror="this.src='https://placehold.co/200x200?text=No+Image'">
                        </div>
                        <div class="info">
                            <div class="p-name" title="${productName}">${productName}</div>
                            <div class="price">${productPriceText}</div>
                            <div class="btn-group">
                                <a class="buy" target="_blank" href="${affiliateLink}" style="background:${btn.c}">${btn.t}</a>
                                <button class="select-btn" onclick="document.querySelector('#product-${pIndex} .select-box').click()">Chọn mua</button>
                            </div>
                        </div>
                    </div>`;
                    pIndex++;
                }
            }
        });

        if (!hasProduct) {
            html += `<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px;">Cửa hàng này hiện chưa có sản phẩm nào khả dụng hoặc đã hết hàng.</div>`;
        } else {
            document.getElementById("cartBar").style.display = "flex";
            updateCartUI();
        }

        main.innerHTML = html + '</div>';
    } catch (e) { 
        console.error(e);
        main.innerHTML = `<div style="text-align:center;padding:50px;color:red;">Lỗi tải dữ liệu! Vui lòng kiểm tra cấu hình Google Sheet.</div>`; 
    }
}

// Logic tích chọn / bỏ chọn sản phẩm và tính tiền dồn vào mảng
function toggleSelectProduct(index, name, price, checkboxElement) {
    const card = document.getElementById(`product-${index}`);
    if (checkboxElement.checked) {
        card.classList.add('selected');
        selectedProducts.push({ index, name, price });
    } else {
        card.classList.remove('selected');
        selectedProducts = selectedProducts.filter(p => p.index !== index);
    }
    updateCartUI();
}

// Cập nhật hiển thị số lượng và tổng tiền dưới thanh đáy màn hình
function updateCartUI() {
    const total = selectedProducts.reduce((sum, item) => sum + item.price, 0);
    document.getElementById("cartCount").innerText = selectedProducts.length;
    document.getElementById("cartTotalPrice").innerText = formatMoney(total);
}

// Hàm thông báo danh sách hàng hóa người dùng đặt lựa chọn mua
function checkoutCart() {
    if (selectedProducts.length === 0) {
        alert("Bạn chưa chọn mặt hàng nào!");
        return;
    }
    let listText = "DANH SÁCH MẶT HÀNG BẠN ĐÃ CHỌN:\n\n";
    selectedProducts.forEach((p, i) => {
        listText += `${i + 1}. ${p.name} - Giá: ${formatMoney(p.price)}\n`;
    });
    const total = selectedProducts.reduce((sum, item) => sum + item.price, 0);
    listText += `\n====================\nTỔNG TIỀN: ${formatMoney(total)}`;
    alert(listText);
}

const urlParams = new URLSearchParams(window.location.search);
const shopId = urlParams.get('id');

if (shopId) { 
    render(shopId); 
} else {
    let grid = '<div class="shop-grid">';
    SHOPS.forEach((s, i) => {
        grid += `
        <div class="shop-card" onclick="location.href='?id=${i+1}'">
            <div class="shop-number">${i+1}</div>
        </div>`;
    });
    document.getElementById("content").innerHTML = grid + '</div>';
}
</script>
</body>
</html>
