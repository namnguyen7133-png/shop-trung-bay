<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG SIÊU THỊ MUA SẮM & DỊCH VỤ</title>
    <style>
        :root {
            --main-color: #fb5531;
            --bg-color: #f5f5f5;
            --success-color: #2ecc71;
        }
       
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-color);
            margin: 0;
            color: #333;
            padding-bottom: 100px;
        }
       
        header {
            background: linear-gradient(135deg, #fb5531, #ff8331);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
       
        .container { max-width: 1200px; margin: auto; padding: 20px; }
       
        .search-bar {
            width: 100%;
            max-width: 600px;
            margin: 15px auto;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
        }
        .search-bar:focus { border-color: var(--main-color); }

        .shop-grid, .products-grid { /* giữ nguyên như cũ */ 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 15px;
        }
        .products-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }

        /* Các style khác giữ nguyên từ code cũ */
        .shop-card, .product-card, .cart-navbar, .btn-back, .page-title, .loading { /* ... giữ nguyên ... */ }

        /* Vòng quay may mắn */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .wheel-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 380px;
        }
        .wheel {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: conic-gradient(#ff6b6b, #ffd93d, #6bcf7f, #4d9fff, #9b6cff, #ff6b6b);
            position: relative;
            margin: 20px auto;
            transition: transform 4s ease-out;
        }
        .wheel::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid #fb5531;
        }
        .prize-result {
            margin-top: 15px;
            font-size: 22px;
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>
