<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG SIÊU THỊ MUA SẮM & DỊCH VỤ</title>
    <style>
        :root {
            --main-color: #fb5531;
            --bg-color: #f5f5f5;
            --success-color: #2ecc71;
        }
       
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-color);
            margin: 0;
            color: #333;
            padding-bottom: 100px;
        }
       
        header {
            background: linear-gradient(135deg, #fb5531, #ff8331);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
       
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
       
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 15px;
        }
       
        .shop-card {
            background: white;
            padding: 20px 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #eee;
            transition: all 0.2s ease;
        }
       
        .shop-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: var(--main-color);
        }
       
        .shop-number {
            background: var(--main-color);
            color: white;
            width: 45px;
            height: 45px;
            line-height: 45px;
            border-radius: 50%;
            margin: 0 auto;
            font-weight: bold;
            font-size: 18px;
        }
       
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
       
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            position: relative;
        }
       
        .product-card.selected {
            border-color: var(--success-color);
            background-color: #f9fff9;
        }
       
        .select-checkbox {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
       
        .image-box {
            width: 100%;
            height: 170px;
            background: #fafafa;
            overflow: hidden;
        }
       
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
       
        .info-box {
            padding: 12px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
       
        .product-name {
            font-size: 13.5px;
            font-weight: 500;
            height: 42px;
            overflow: hidden;
            margin-bottom: 8px;
            line-height: 1.3;
            color: #333;
        }
       
        .product-price {
            color: #ee4d2d;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 12px;
        }
       
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: auto;
        }
       
        .btn-link {
            display: block;
            color: white;
            padding: 8px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 11.5px;
            text-transform: uppercase;
            text-align: center;
        }
       
        .btn-select {
            display: block;
            background: #fff;
            color: #555;
            border: 1px solid #ccc;
            padding: 7px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 11.5px;
            cursor: pointer;
            text-transform: uppercase;
        }
       
        .product-card.selected .btn-select {
            background: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }
       
        .btn-back {
            display: inline-block;
            margin-bottom: 15px;
            padding: 8px 18px;
            background: #fff;
            color: var(--main-color);
            border: 1px solid var(--main-color);
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
       
        .page-title {
            margin-bottom: 15px;
            font-weight: bold;
            color: #444;
            font-size: 19px;
        }
       
        .cart-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.12);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
       
        .loading {
            text-align: center;
            padding: 80px 20px;
            font-size: 18px;
            color: #666;
        }
    </style>
</head>
<body>
<header>HỆ THỐNG SIÊU THỊ MUA SẮM & DỊCH VỤ</header>
<div class="container" id="mainContent"></div>

<div class="cart-navbar" id="summaryCartBar" style="display: none;">
    <div class="cart-status">
        Đã chọn: <span id="totalItems" style="font-weight:bold; color: var(--main-color);">0</span> mặt hàng |
        Tổng tính: <span class="cart-total-price" id="totalPrice">0đ</span>
    </div>
    <button class="btn-checkout" onclick="showSelectedInvoice()">Xem danh sách chọn</button>
</div>

<script>
// ==================== CẤU HÌNH ====================
const PUBLISHED_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFCL1NiCeMNUGWbtkzgUgsQIdhjbASXoard37mTu0QQQFxUr1YjI7PSsMNdjDu2hRydSWbx-Ezaypa/pub?output=csv";

const CORS_PROXY = "https://corsproxy.io/?";

let SHOPS = [];
let cartList = [];

// ==================== HÀM HỖ TRỢ ====================
function generateButtonStyle(url) {
    if (!url) return { text: "XEM CHI TIẾT", color: "#fb5531" };
    const link = url.toLowerCase();
    if (link.includes('shopee.vn')) return { text: "MUA TẠI SHOPEE", color: "#ee4d2d" };
    if (link.includes('zalo.me')) return { text: "NHẮN ZALO TƯ VẤN", color: "#0068ff" };
    if (link.includes('facebook.com')) return { text: "LIÊN HỆ FACEBOOK", color: "#1877f2" };
    return { text: "XEM CHI TIẾT", color: "#fb5531" };
}

function parseCurrencyToNumber(priceStr) {
    if (!priceStr) return 0;
    let text = priceStr.toLowerCase().replace(/"/g, "").trim();
    if (text.includes('k')) {
        let val = parseFloat(text.replace('k', '').replace(',', '.'));
        return isNaN(val) ? 0 : Math.round(val * 1000);
    }
    let rawNum = parseInt(text.replace(/[^0-9]/g, ""), 10);
    return isNaN(rawNum) ? 0 : rawNum;
}

function formatCurrencyVN(number) {
    return number.toLocaleString('vi-VN') + 'đ';
}

// ==================== TẢI DANH SÁCH SHOP TỪ CSV ====================
async function loadShops() {
    try {
        const fetchUrl = CORS_PROXY + encodeURIComponent(PUBLISHED_CSV_URL);
        const response = await fetch(fetchUrl);
        const csvText = await response.text();
        const rows = csvText.split(/\r?\n/);

        SHOPS = [];
        // Bắt đầu từ dòng 2 (dòng 1 là header)
        for (let i = 1; i < rows.length; i++) {
            if (!rows[i].trim()) continue;
            const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const shopName = cols[0]?.replace(/"/g, "").trim();
            const gid = cols[1]?.replace(/"/g, "").trim();   // Giả sử cột B là GID

            if (shopName) {
                SHOPS.push({ n: shopName, g: gid || "0" });
            }
        }
        return SHOPS.length > 0;
    } catch (e) {
        console.error(e);
        return false;
    }
}

// ==================== HIỂN THỊ SẢN PHẨM ====================
async function renderShopProducts(shopIndex) {
    const mainView = document.getElementById("mainContent");
    mainView.innerHTML = '<div class="loading">Đang tải sản phẩm...</div>';
    document.getElementById("summaryCartBar").style.display = "none";
    cartList = [];

    const index = parseInt(shopIndex) - 1;
    const currentShop = SHOPS[index];
    if (!currentShop) return;

    try {
        const shopUrl = `${PUBLISHED_CSV_URL}&gid=${currentShop.g}`;
        const fetchUrl = CORS_PROXY + encodeURIComponent(shopUrl);

        const response = await fetch(fetchUrl);
        const csvData = await response.text();
        const dataRows = csvData.split(/\r?\n/);

        let htmlGrid = `
            <div class="btn-back" onclick="location.href='?'">⬅ Quay lại trang chủ</div>
            <div class="page-title">Cửa hàng: ${currentShop.n} (Số ${shopIndex})</div>
            <div class="products-grid">`;

        let validProductCount = 0;

        for (let i = 1; i < dataRows.length; i++) {
            const rowText = dataRows[i].trim();
            if (!rowText) continue;

            const columns = rowText.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            const productName      = columns[3]?.replace(/"/g, "").trim() || "";
            const productPriceText = columns[2]?.replace(/"/g, "").trim() || "";
            let imageUrl           = columns[10]?.replace(/"/g, "").trim() || "";
            const linkUuDai        = columns[8]?.replace(/"/g, "").trim() || "#";
            const stockStatus      = columns[4]?.replace(/"/g, "").trim() || "";

            if (productName && (stockStatus === "Còn" || stockStatus === "1" || stockStatus.toLowerCase() === "còn")) {
                const buttonConfig = generateButtonStyle(linkUuDai);
                const numericPrice = parseCurrencyToNumber(productPriceText);

                if (imageUrl.includes('youtu')) {
                    imageUrl = `https://img.youtube.com/vi/${imageUrl.split('/').pop().split('?')[0]}/0.jpg`;
                }

                htmlGrid += `
                <div class="product-card" id="prod-card-${validProductCount}">
                    <input type="checkbox" class="select-checkbox" onchange="onSelectProductChange(${validProductCount}, '${productName.replace(/'/g, "\\'")}', ${numericPrice}, this)">
                    <div class="image-box">
                        <img src="${imageUrl}" alt="${productName}" onerror="this.src='https://placehold.co/200x200?text=No+Image'">
                    </div>
                    <div class="info-box">
                        <div class="product-name" title="${productName}">${productName}</div>
                        <div class="product-price">${productPriceText || "Liên hệ"}</div>
                        <div class="action-buttons">
                            <a class="btn-link" target="_blank" href="${linkUuDai}" style="background:${buttonConfig.color}">${buttonConfig.text}</a>
                            <button class="btn-select" onclick="document.querySelector('#prod-card-${validProductCount} .select-checkbox').click()">Chọn mua</button>
                        </div>
                    </div>
                </div>`;
                validProductCount++;
            }
        }

        if (validProductCount === 0) {
            htmlGrid += `<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #666;">
                Hiện tại toàn bộ mặt hàng trong shop này đã hết.<br>
                <small>Vui lòng kiểm tra lại cột "Tình trạng" trong Google Sheet (phải ghi "Còn" hoặc "1")</small>
            </div>`;
        } else {
            document.getElementById("summaryCartBar").style.display = "flex";
            refreshCartUI();
        }

        mainView.innerHTML = htmlGrid + '</div>';

    } catch (error) {
        console.error(error);
        mainView.innerHTML = `<div style="text-align:center;padding:60px;color:red;">Lỗi tải dữ liệu. Vui lòng thử lại sau.</div>`;
    }
}

// Các hàm cũ giữ nguyên
function onSelectProductChange(id, name, price, element) {
    const targetCard = document.getElementById(`prod-card-${id}`);
    if (element.checked) {
        targetCard.classList.add('selected');
        cartList.push({ id, name, price });
    } else {
        targetCard.classList.remove('selected');
        cartList = cartList.filter(item => item.id !== id);
    }
    refreshCartUI();
}

function refreshCartUI() {
    const totalAmount = cartList.reduce((acc, item) => acc + item.price, 0);
    document.getElementById("totalItems").innerText = cartList.length;
    document.getElementById("totalPrice").innerText = formatCurrencyVN(totalAmount);
}

function showSelectedInvoice() {
    if (cartList.length === 0) {
        alert("Vui lòng tích chọn mặt hàng muốn tính tiền!");
        return;
    }
    let invoiceText = "HÓA ĐƠN TỔM HỢP SẢN PHẨM ĐÃ CHỌN:\n\n";
    cartList.forEach((item, index) => {
        invoiceText += `${index + 1}. ${item.name} → ${formatCurrencyVN(item.price)}\n`;
    });
    const total = cartList.reduce((acc, item) => acc + item.price, 0);
    invoiceText += `\n-----------------------------------\nTỔNG CỘNG: ${formatCurrencyVN(total)}`;
    alert(invoiceText);
}

// ==================== KHỞI ĐỘNG ====================
async function init() {
    const success = await loadShops();
    if (!success) {
        document.getElementById("mainContent").innerHTML = `<div style="text-align:center;padding:80px;color:red;">Không tải được danh sách cửa hàng.</div>`;
        return;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const shopId = urlParams.get('id');

    if (shopId) {
        renderShopProducts(shopId);
    } else {
        let grid = '<div class="shop-grid">';
        SHOPS.forEach((shop, i) => {
            grid += `
            <div class="shop-card" onclick="location.href='?id=${i+1}'">
                <div class="shop-number">${i+1}</div>
            </div>`;
        });
        document.getElementById("mainContent").innerHTML = grid + '</div>';
    }
}

init();
</script>
</body>
</html>
