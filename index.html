<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Shop Bảy Hằng 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #fb5531; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { max-width: 1000px; margin: auto; padding: 10px; }
        /* Lưới sản phẩm - Tự co giãn cho điện thoại */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .p-info { padding: 10px; flex-grow: 1; text-align: center; }
        .p-name { font-size: 14px; font-weight: bold; height: 40px; overflow: hidden; margin-bottom: 5px; }
        .p-price { color: #ee4d2d; font-weight: bold; margin-bottom: 10px; }
        .btn-buy { background: #fb5531; color: white; text-decoration: none; padding: 8px; border-radius: 4px; display: block; font-size: 14px; }
        /* Danh sách shop */
        .shop-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .shop-btn { background: white; border: 1px solid #fb5531; color: #fb5531; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }
        .shop-btn:hover { background: #fb5531; color: white; }
        #loading { text-align: center; padding: 20px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

<header>
    <h1 id="shop-title">HỆ THỐNG SHOP BẢY HẰNG</h1>
    <p id="sub-title">Đang tải gian hàng...</p>
</header>

<div class="container">
    <div id="main-content">
        <div id="loading">Đang kết nối máy chủ Google Sheets...</div>
    </div>
</div>

<script>
const SHEET_ID = "1_Xwvp767BMtrNqA-9IF3ROOSbBlBk1k_QwvE2CT-h5s";
const urlParams = new URLSearchParams(window.location.search);
const user = urlParams.get('user');

// Danh sách 32 Shop (Bạn có thể sửa tên ở đây)
const shopNames = ["Hoài Nam", "Ngân An", "Văn Tuấn", "Anh Thư", "Minh Châu", "Thanh Tùng"]; 

if (!user) {
    showShopList();
} else {
    loadProducts(user);
}

function showShopList() {
    document.getElementById("sub-title").innerText = "Vui lòng chọn một cửa hàng";
    let html = '<div class="shop-list">';
    // Tự động đánh số 1, 2, 3...
    shopNames.forEach((name, index) => {
        let shopID = (index + 1).toString().padStart(2, '0');
        // Thêm mã ngẫu nhiên t=... để tránh trùng lặp link khi gửi Facebook
        html += `<a class="shop-btn" href="?user=${encodeURIComponent(name)}&t=${Date.now()}">🏪 Shop ${shopID}: ${name}</a>`;
    });
    html += '</div>';
    document.getElementById("main-content").innerHTML = html;
}

async function loadProducts(userName) {
    document.getElementById("sub-title").innerText = "Gian hàng của: " + userName;
    try {
        const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(userName)}`);
        const text = await response.text();
        const rows = text.split("\n").slice(2); // Bỏ 2 dòng tiêu đề
        
        let html = '<div class="grid">';
        let count = 0;

        rows.forEach(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            let name = cols[0]?.replace(/"/g, "");
            let img = cols[1]?.replace(/"/g, "");
            let price = cols[2]?.replace(/"/g, "");
            let link = cols[3]?.replace(/"/g, "");
            let stock = cols[4]?.replace(/"/g, "");

            if (name && stock == "1") {
                html += `
                <div class="card">
                    <img src="${img}" onerror="this.src='https://via.placeholder.com/160?text=Anh-Cho-Duyet'">
                    <div class="p-info">
                        <div class="p-name">${name}</div>
                        <div class="p-price">${price} đ</div>
                        <a href="${link}" class="btn-buy" target="_blank">MUA NGAY</a>
                    </div>
                </div>`;
                count++;
            }
        });

        html += '</div>';
        if (count === 0) html = "<p style='text-align:center;'>Shop này hiện chưa có hàng.</p>";
        document.getElementById("main-content").innerHTML = html;
        
    } catch (e) {
        document.getElementById("main-content").innerHTML = "❌ Lỗi: Không tìm thấy dữ liệu Shop.";
    }
}
</script>
</body>
</html>
