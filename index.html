<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG SIÊU THỊ MUA SẮM & DỊCH VỤ</title>
    <style>
        :root {
            --main-color: #fb5531;
            --bg-color: #f5f5f5;
            --success-color: #2ecc71;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); margin: 0; color: #333; padding-bottom: 100px; }
        header { background: linear-gradient(135deg, #fb5531, #ff8331); color: white; text-align: center; padding: 20px; font-size: 24px; font-weight: bold; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }

        .search-bar { width: 100%; max-width: 600px; margin: 15px auto; padding: 12px 20px; border: 2px solid #ddd; border-radius: 50px; font-size: 16px; }
        .search-bar:focus { border-color: var(--main-color); }

        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }

        .shop-card, .product-card { /* giữ nguyên style cũ của bạn */ background: white; border-radius: 12px; padding: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.06); }
        /* ... (bạn copy phần style cũ vào đây) ... */

        /* Modal Quay thưởng */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; }
        .wheel-container { background: white; padding: 25px; border-radius: 20px; text-align: center; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .wheel { width: 300px; height: 300px; border-radius: 50%; background: conic-gradient(#ff4757, #ffa502, #2ed573, #1e90ff, #3742fa, #ff4757); position: relative; margin: 20px auto; transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .wheel::after { content: ''; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); border-left: 25px solid transparent; border-right: 25px solid transparent; border-bottom: 50px solid #fb5531; z-index: 10; }
        
        .voucher-box { margin: 20px 0; padding: 15px; background: #f8f9fa; border: 2px dashed #fb5531; border-radius: 12px; font-size: 18px; }
    </style>
</head>
<body>
<header>HỆ THỐNG SIÊU THỊ MUA SẮM & DỊCH VỤ</header>
<div class="container" id="mainContent"></div>

<div class="cart-navbar" id="summaryCartBar" style="display: none;">
    <div class="cart-status">
        Đã chọn: <span id="totalItems" style="font-weight:bold; color: var(--main-color);">0</span> mặt hàng |
        Tổng: <span class="cart-total-price" id="totalPrice">0đ</span>
    </div>
    <div>
        <button onclick="showLuckyWheel()" style="margin-right:8px; background:#9b59b6; padding:10px 18px;">🎰 Quay Thưởng</button>
        <button onclick="showSelectedInvoice()">Xem giỏ hàng</button>
    </div>
</div>

<!-- Modal Quay số -->
<div id="luckymodal" class="modal">
    <div class="wheel-container">
        <h2>🎉 QUAY SỐ NHẬN VOUCHER ĐẶC BIỆT 🎉</h2>
        <div id="wheel" class="wheel"></div>
        <button onclick="spinWheel()" id="spinBtn" style="padding:14px 40px; font-size:18px; background:#fb5531; color:white; border:none; border-radius:50px; cursor:pointer; margin:10px;">QUAY NGAY!</button>
        <div id="result" class="voucher-box" style="display:none;"></div>
        <button onclick="closeModal()" style="margin-top:10px;">Đóng</button>
    </div>
</div>

<script>
// ==================== CẤU HÌNH ====================
const PUBLISHED_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFCL1NiCeMNUGWbtkzgUgsQIdhjbASXoard37mTu0QQQFxUr1YjI7PSsMNdjDu2hRydSWbx-Ezaypa/pub?output=csv";
const CORS_PROXY = "https://corsproxy.io/?";

let SHOPS = [];
let cartList = [];
let currentProducts = [];

// Danh sách Voucher & Khuyến mãi ngẫu nhiên
const prizes = [
    { text: "Voucher 100.000đ", value: 100000, code: "VOUCHER100K" },
    { text: "Giảm 50% đơn hàng", value: "50%", code: "GIAM50" },
    { text: "Miễn phí ship toàn quốc", value: 0, code: "FREESHIP" },
    { text: "Giảm 30.000đ", value: 30000, code: "GIAM30K" },
    { text: "Tặng 1 sản phẩm bất kỳ", value: "Tặng phẩm", code: "TANGSP" },
    { text: "Voucher 200.000đ", value: 200000, code: "VOUCHER200K" },
    { text: "Giảm 20% toàn shop", value: "20%", code: "GIAM20" },
    { text: "May mắn lần sau 👀", value: 0, code: "TRYAGAIN" }
];

function getRandomPrize() {
    // Tăng xác suất giải nhỏ
    const rand = Math.random();
    if (rand < 0.15) return prizes[5];      // Voucher 200k
    if (rand < 0.35) return prizes[0];      // Voucher 100k
    if (rand < 0.55) return prizes[2];      // Freeship
    return prizes[Math.floor(Math.random() * prizes.length)];
}

// ==================== Các hàm cũ (loadShops, renderShopProducts, filterProducts...) ====================
// ... Giữ nguyên như code trước đó ...

// ==================== VÒNG QUAY MAY MẮN ====================
function showLuckyWheel() {
    document.getElementById("luckymodal").style.display = "flex";
    document.getElementById("result").style.display = "none";
    document.getElementById("spinBtn").disabled = false;
}

function closeModal() {
    document.getElementById("luckymodal").style.display = "none";
}

let isSpinning = false;
function spinWheel() {
    if (isSpinning) return;
    isSpinning = true;
    document.getElementById("spinBtn").disabled = true;

    const wheel = document.getElementById("wheel");
    const randomSpin = 2000 + Math.floor(Math.random() * 2000);
    wheel.style.transform = `rotate(${randomSpin}deg)`;

    setTimeout(() => {
        const prize = getRandomPrize();
        const resultDiv = document.getElementById("result");
        
        resultDiv.innerHTML = `
            <strong style="color:#e74c3c;">🎁 ${prize.text}</strong><br>
            <small>Mã voucher: <b>${prize.code}</b></small><br>
            <button onclick="copyVoucher('${prize.code}')" style="margin-top:8px; padding:6px 16px; background:#2ecc71; color:white; border:none; border-radius:6px;">📋 Sao chép mã</button>
        `;
        resultDiv.style.display = "block";
        isSpinning = false;
    }, 4200);
}

function copyVoucher(code) {
    navigator.clipboard.writeText(code).then(() => {
        alert("✅ Đã sao chép mã voucher: " + code);
    });
}

// ==================== KHỞI ĐỘNG ====================
async function init() {
    // ... load shops và render như code cũ ...
}
init();
</script>
</body>
</html>
