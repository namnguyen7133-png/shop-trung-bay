<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG SIÊU THỊ 33 SHOP & DỊCH VỤ</title>
    <style>
        :root { --main-color: #fb5531; --bg-color: #f5f5f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); margin: 0; color: #333; }
        header { background: linear-gradient(135deg, #fb5531, #ff8331); color: white; text-align: center; padding: 20px; font-size: 22px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 1100px; margin: auto; padding: 15px; }
        
        /* Lưới Shop */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px; }
        .shop-card { background: white; padding: 20px 10px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; }
        .shop-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-color: var(--main-color); }
        .shop-number { background: var(--main-color); color: white; width: 40px; height: 40px; line-height: 40px; border-radius: 50%; margin: 0 auto; font-weight: bold; font-size: 18px; }
        
        /* Lưới sản phẩm */
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.08); display: flex; flex-direction: column; }
        .media-box { width: 100%; height: 170px; background: #fafafa; overflow: hidden; position: relative; }
        .media-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; }
        .p-name { font-size: 13px; font-weight: 500; height: 36px; overflow: hidden; margin-bottom: 5px; line-height: 18px; }
        .price { color: #ee4d2d; font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .buy { display: block; color: white; padding: 10px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .back { display: inline-block; margin-bottom: 15px; padding: 8px 15px; background: #fff; color: var(--main-color); border: 1px solid var(--main-color); border-radius: 20px; cursor: pointer; font-weight: bold; }
        .shop-title { margin-bottom: 15px; font-weight: bold; color: #555; font-size: 18px; }
    </style>
</head>
<body>

<header>HỆ THỐNG SIÊU THỊ 33 SHOP & DỊCH VỤ</header>
<div class="container" id="content"></div>

<script>
// Giữ nguyên ID gốc từ trang tính của bạn
const SHEET_ID = "1_Xwvp767BMtRnqA-9lF3ROOSbBIBk1k_QwvE2CT-h5s";

const SHOPS = [
    {n: "Ngân An", g: "0"}, {n: "Minh Châu", g: "2042428163"}, {n: "Bích Ngọc", g: "2009289883"},
    {n: "Gia Bách", g: "793885535"}, {n: "Ngô Gialinh", g: "2040744619"}, {n: "Minh Phương", g: "1363743009"},
    {n: "Anh Dũng", g: "87027625"}, {n: "Hải Vinh", g: "1113281647"}, {n: "Bạch Anh", g: "71371535"},
    {n: "Kim Huệ", g: "1965546264"}, {n: "Tuấn Anh", g: "1073997052"}, {n: "Thế Anh", g: "849927033"},
    {n: "Thị Mai", g: "298899208"}, {n: "Việt Hưng", g: "756110609"}, {n: "Thị Hồng", g: "879903903"},
    {n: "Văn Hiệp", g: "1122882591"}, {n: "Thị Chi", g: "232472008"}, {n: "Tấn Bắc", g: "632628873"},
    {n: "Thị Tâm", g: "1889905962"}, {n: "Văn Giữ", g: "731061721"}, {n: "Thị Bình", g: "1643784423"},
    {n: "Bích Nguyệt", g: "332503970"}, {n: "Văn Tuấn", g: "1594362635"}, {n: "Yến Nhi", g: "1770126917"},
    {n: "Thị Phương", g: "1795348787"}, {n: "Hoài Nam", g: "1468986790"}, {n: "Khắc Năng", g: "801738430"},
    {n: "Thị Hà", g: "673532367"}, {n: "Minh Nam", g: "1798395208"}, {n: "Kim Anh", g: "2038870297"},
    {n: "Minh Hằng", g: "1796982267"}, {n: "Quý Cường", g: "1593249867"}, 
    {n: "DỊCH VỤ VỆ SINH", g: "518971287"}
];

function getBtn(url) {
    if (!url) return { t: "XEM CHI TIẾT", c: "#fb5531" };
    if (url.includes('shopee.vn')) return { t: "MUA TẠI SHOPEE", c: "#ee4d2d" };
    if (url.includes('zalo.me')) return { t: "NHẮN ZALO TƯ VẤN", c: "#0068ff" };
    if (url.includes('facebook.com')) return { t: "LIÊN HỆ FACEBOOK", c: "#1877f2" };
    return { t: "XEM CHI TIẾT", c: "#fb5531" };
}

async function render(shopIndex) {
    const main = document.getElementById("content");
    main.innerHTML = '<div style="text-align:center;padding:50px;font-weight:500;">Đang tải dữ liệu cửa hàng...</div>';
    
    const idx = parseInt(shopIndex) - 1;
    const shop = SHOPS[idx];
    
    if(!shop) {
        location.href = '?';
        return;
    }

    try {
        // Đồng bộ gọi định dạng dữ liệu cấu trúc CSV từ Google Sheets API công khai
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${shop.g}`);
        const csv = await res.text();
        const rows = csv.split("\n").slice(1);
        
        let html = `
            <div class="back" onclick="location.href='?'">⬅ Quay lại trang chủ</div>
            <div class="shop-title">Cửa hàng: ${shop.n} (Số ${shopIndex})</div>
            <div class="products">`;
        
        let hasProduct = false;

        rows.forEach(r => {
            // Tách các cột dữ liệu bằng dấu phẩy tiêu chuẩn xử lý chuỗi CSV
            const col = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            if (col[0]) {
                const stockStatus = col[4]?.replace(/"/g, "").trim();
                
                // Đã sửa điều kiện lọc: Khớp với chữ "Còn" trên file trang tính thực tế
                if (stockStatus === "Còn" || stockStatus === "1") {
                    hasProduct = true;
                    const btn = getBtn(col[3]?.trim());
                    let img = col[1]?.replace(/"/g, "").trim();
                    
                    // Xử lý ảnh đại diện nếu link là video Youtube
                    if (img.includes('youtu')) {
                        img = `https://img.youtube.com/vi/${img.split('/').pop()}/0.jpg`;
                    }
                    
                    const productName = col[0].replace(/"/g, "").trim();
                    const productPrice = col[2]?.replace(/"/g, "").trim() || "Liên hệ";
                    const affiliateLink = col[3]?.replace(/"/g, "").trim() || "#";

                    html += `
                    <div class="card">
                        <div class="media-box"><img src="${img}" alt="${productName}" onerror="this.src='https://placehold.co/200x200?text=No+Image'"></div>
                        <div class="info">
                            <div class="p-name" title="${productName}">${productName}</div>
                            <div class="price">${productPrice}</div>
                            <a class="buy" target="_blank" href="${affiliateLink}" style="background:${btn.c}">${btn.t}</a>
                        </div>
                    </div>`;
                }
            }
        });

        if (!hasProduct) {
            html += `<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px;">Cửa hàng này hiện chưa có sản phẩm nào khả dụng hoặc đã hết hàng.</div>`;
        }

        main.innerHTML = html + '</div>';
    } catch (e) { 
        console.error(e);
        main.innerHTML = `<div style="text-align:center;padding:50px;color:red;">Lỗi kết nối dữ liệu! Vui lòng kiểm tra lại quyền chia sẻ liên kết trên Google Sheet.</div>`; 
    }
}

const urlParams = new URLSearchParams(window.location.search);
const shopId = urlParams.get('id');

if (shopId) { 
    render(shopId); 
} else {
    let grid = '<div class="shop-grid">';
    SHOPS.forEach((s, i) => {
        grid += `
        <div class="shop-card" onclick="location.href='?id=${i+1}'">
            <div class="shop-number">${i+1}</div>
        </div>`;
    });
    document.getElementById("content").innerHTML = grid + '</div>';
}
</script>
</body>
</html>
